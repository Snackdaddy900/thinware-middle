<!DOCTYPE html>
<html>
<head>
  <title>Quote Debug</title>
  <style>
    body { font-family: Arial; padding:20px; }
    input, select, button { display:block; margin-bottom:10px; padding:10px; width:300px; }
    #status { white-space:pre-wrap; background:#eee; padding:10px; }
  </style>
</head>
<body>

<h2>Quote</h2>

<select id="product">
  <option>Sphere</option>
  <option>Sphere 1</option>
  <option selected>Sphere 2</option>
</select>

<select id="finish">
  <option>Green</option>
  <option>Blue</option>
  <option selected>Red</option>
</select>

<input id="quantity" type="number" value="10" />

<input id="name" placeholder="Name" />
<input id="email" placeholder="Email" />

<button id="send">Send</button>

<pre id="status"></pre>

<script>
document.getElementById("send").addEventListener("click", async () => {

  // FORCE payload (no hidden logic)
  const payload = {
    product: document.getElementById("product").value,
    finish: document.getElementById("finish").value,
    quantity: Number(document.getElementById("quantity").value),
    lead: {
      name: document.getElementById("name").value,
      email: document.getElementById("email").value
    }
  };

  try {
    const res = await fetch('/.netlify/functions/send-quote-lead', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    document.getElementById("status").textContent = JSON.stringify(data, null, 2);

  } catch (err) {
    document.getElementById("status").textContent = err.message;
  }

});
</script>

</body>
</html>
