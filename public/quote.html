<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Quote</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      max-width: 500px;
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      font-size: 16px;
    }
    button {
      cursor: pointer;
    }
    pre {
      background: #f4f4f4;
      padding: 12px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<h1>Quote</h1>

<select id="product">
  <option>Sphere 1</option>
  <option>Sphere 2</option>
</select>

<select id="color">
  <option>Green</option>
  <option>Red</option>
</select>

<input id="quantity" type="number" placeholder="Quantity" value="10" />

<input id="name" type="text" placeholder="Name" />
<input id="email" type="email" placeholder="Email" />

<button onclick="handleSend()">Send</button>

<pre id="responseBox"></pre>

<script>
async function handleSend() {
  const payload = {
    lead: {
      name: document.getElementById("name").value,
      email: document.getElementById("email").value
    },
    product: document.getElementById("product").value,
    color: document.getElementById("color").value,
    quantity: document.getElementById("quantity").value
  };

  console.log("Sending payload:", payload);

  try {
    const res = await fetch("/.netlify/functions/send-quote-lead", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const text = await res.text();

    try {
      const data = JSON.parse(text);
      document.getElementById("responseBox").textContent =
        JSON.stringify(data, null, 2);
    } catch (e) {
      document.getElementById("responseBox").textContent =
        "Not JSON response:\n" + text;
    }

  } catch (err) {
    document.getElementById("responseBox").textContent =
      "Request failed: " + err.message;
  }
}
</script>

</body>
</html>
